<?xml version="1.0" encoding="UTF-8"?>
<!-- Symbolic: disc + refracted light fan (monochrome). -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Incoming beam -->
  <path d="M1 5.5 L6.5 7.5 L6.5 6.5 Z" fill="#2e3436" opacity="0.55"/>
  <!-- Spectrum fan (bands as strokes) -->
  <path d="M9.5 6.2 L15 4.2" fill="none" stroke="#2e3436" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <path d="M9.7 6.8 L15 5.5" fill="none" stroke="#2e3436" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
  <path d="M9.8 7.5 L15 7" fill="none" stroke="#2e3436" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <path d="M9.7 8.2 L15 8.5" fill="none" stroke="#2e3436" stroke-width="0.9" stroke-linecap="round" opacity="0.55"/>
  <path d="M9.5 8.8 L15 10" fill="none" stroke="#2e3436" stroke-width="0.9" stroke-linecap="round" opacity="0.45"/>
  <!-- Disc -->
  <circle cx="7" cy="9" r="3.6" fill="none" stroke="#2e3436" stroke-width="1.25"/>
  <circle cx="7" cy="9" r="1.15" fill="none" stroke="#2e3436" stroke-width="1"/>
  <circle cx="7" cy="9" r="0.4" fill="#2e3436"/>
</svg>
