# Flatpak manifest — build from the repository root with:
#   flatpak-builder --user --force-clean --repo=flatpak-repo build-flatpak \
#     flatpak/org.ready2rip.Ready2Rip.yml
#   flatpak build-bundle flatpak-repo ready2rip.flatpak org.ready2rip.Ready2Rip
#
# Optical drives need device access inside the sandbox.

app-id: org.ready2rip.Ready2Rip
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: ready2rip

finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  # CD/DVD drives (sr0, sg*, etc.)
  - --device=all
  - --filesystem=xdg-music:create
  - --filesystem=xdg-download:ro
  - --talk-name=org.freedesktop.Notifications

cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/man
  - /share/gtk-doc
  - '*.la'
  - '*.a'

modules:
  # libcdio + libcdio-paranoia provide the `cd-paranoia` / `cdparanoia` tools.
  # The GNOME runtime does not ship them; without this the app cannot read discs.
  - name: libcdio
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --disable-cxx
      - --disable-example-progs
      - --without-cddb
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libcdio/libcdio-2.1.0.tar.bz2
        sha256: 8550e9589dbd594bfac93b81ecf129b1dc9d0d51e90f9696f1b2f9b2af32712b

  - name: libcdio-paranoia
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --disable-example-progs
    # ready2rip looks for both names; ensure the classic name exists.
    post-install:
      - |
        if [ -x ${FLATPAK_DEST}/bin/cd-paranoia ] && [ ! -e ${FLATPAK_DEST}/bin/cdparanoia ]; then
          ln -s cd-paranoia ${FLATPAK_DEST}/bin/cdparanoia
        fi
    sources:
      - type: archive
        url: https://github.com/libcdio/libcdio-paranoia/releases/download/release-10.2%2B2.0.2/libcdio-paranoia-10.2%2B2.0.2.tar.bz2
        sha256: 186892539dedd661276014d71318c8c8f97ecb1250a86625256abd4defbf0d0c

  - name: ready2rip
    buildsystem: meson
    sources:
      - type: dir
        path: ..
